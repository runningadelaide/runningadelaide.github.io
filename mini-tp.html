<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ARC Mini Training Plan">
    <meta name="author" content="Adelaide Running Crew">
    <link rel="icon" href="https://storage.googleapis.com/arc-training/website/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="96x96" href="https://storage.googleapis.com/arc-training/website/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://storage.googleapis.com/arc-training/website/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="228x228" href="https://storage.googleapis.com/arc-training/website/favicon-228x228.png">
    <link rel="apple-touch-icon" href="https://storage.googleapis.com/arc-training/website/arc-logo-180x180.png">

    <title>ARC - Mini Training Plan</title>

    <!-- Custom Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Shared Modern Stylesheet -->
    <link rel="stylesheet" href="css/style.css" type="text/css">

    <style>
        .mini-tp-wrapper {
            padding: 40px 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .social-header {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .social-btn-logo {
            height: 36px;
            width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            padding: 6px;
            transition: var(--transition);
        }

        .social-btn-logo:hover {
            transform: scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 174, 239, 0.3);
        }

        .social-btn-logo img {
            height: 100%;
            width: 100%;
            object-fit: contain;
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1100px;
            padding: 0 16px;
        }

        .mini-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
            text-align: center;
        }

        .mini-card:hover {
            border-color: var(--accent);
        }

        .mini-card h4 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            text-align: center;
        }

        .mini-card hr.thin {
            border: 0;
            height: 1px;
            background-color: var(--border-color);
            margin: 16px 0;
        }

        .card-dynamic-content {
            min-height: 100px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <main class="mini-tp-wrapper">
        <!-- Social and Navigation Header -->
        <div class="social-header">
            <a class="social-btn-logo" href="index.html" title="Go to Homepage">
                <img src="https://storage.googleapis.com/arc-training/website/arc-logo-170x114.png" alt="ARC Logo" />
            </a>
            <a class="social-btn-logo" href="https://www.facebook.com/adelaiderunning" target="_blank"
                rel="noopener noreferrer" title="Facebook Page">
                <img src="https://storage.googleapis.com/arc-training/website/Facebook_Logo_Primary.png"
                    alt="Facebook" />
            </a>
            <a class="social-btn-logo" href="https://www.instagram.com/adelaiderunningcrew/" target="_blank"
                rel="noopener noreferrer" title="Instagram Profile">
                <img src="https://storage.googleapis.com/arc-training/website/Instagram_Glyph_Gradient.png"
                    alt="Instagram" />
            </a>
            <a class="social-btn-logo"
                href="https://docs.google.com/spreadsheets/d/1SQq7DSinO7do-sdqUjZZb0sV437SHRMICMlUQlFFy-g/pub"
                target="_blank" rel="noopener noreferrer" title="Open Google Sheet">
                <img src="https://storage.googleapis.com/arc-training/website/google-ss.png" alt="Google Sheet" />
            </a>
        </div>
        <p class="text-center" style="margin-bottom: 24px; font-weight: 500;">Quick session view to save as a bookmark!
        </p>

        <!-- Mini Training Plan Cards -->
        <div class="mini-grid">
            <!-- Wednesday Intervals -->
            <div class="mini-card">
                <div>
                    <img src="https://storage.googleapis.com/arc-training/website/icons/hare-mirror.png"
                        alt="Interval training mascot" class="card-header-icon">
                    <h4>Intervals - Wed 6pm</h4>
                    <hr class="thin">
                    <div class="schedule-scroll-container">
                        <div id="wedtraining" class="runs-list">
                            <p class="text-muted text-center">Loading schedule...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Saturday Long Run -->
            <div class="mini-card">
                <div>
                    <img src="https://storage.googleapis.com/arc-training/website/icons/tortoise.png"
                        alt="Long run mascot" class="card-header-icon">
                    <h4>Long Run - Sat 8am</h4>
                    <hr class="thin">
                    <div class="schedule-scroll-container">
                        <div id="sattraining" class="runs-list">
                            <p class="text-muted text-center">Loading schedule...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Upcoming Races -->
            <div class="mini-card">
                <div>
                    <img src="https://storage.googleapis.com/arc-training/website/icons/hare.png" alt="Races mascot"
                        class="card-header-icon">
                    <h4>Upcoming Races</h4>
                    <hr class="thin">
                    <div class="schedule-scroll-container">
                        <div id="racesdiv" class="runs-list">
                            <p class="text-muted text-center">Loading schedule...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Shared main.js script containing fetcher/parser/render logic -->
    <script type="text/javascript" src="js/main.js"></script>
</body>

</html>
